name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Build & release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build app bundle
        run: uv run pyinstaller StreamManager.spec

      - name: Ad-hoc sign app bundle
        run: codesign --force --deep --sign - dist/StreamManager.app

      - name: Zip app for distribution
        run: cd dist && zip -r StreamManager-macOS-arm64.zip StreamManager.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: dist/StreamManager-macOS-arm64.zip
          body: |
            ## Installation

            1. Download and unzip `StreamManager-macOS-arm64.zip`
            2. Move `StreamManager.app` to your Applications folder
            3. Right-click → Open (required once to approve the app)
            4. Run the dependency installer in Terminal:
               ```bash
               /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/issachar-vin/stream-manager/main/scripts/install-deps.sh)"
               ```
