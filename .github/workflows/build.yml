name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14  # arm64 — M1/M2 native
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Build app bundle
        run: uv run pyinstaller StreamManager.spec

      - name: Zip app for distribution
        run: cd dist && zip -r StreamManager-macOS-arm64.zip StreamManager.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamManager-macOS-arm64
          path: dist/StreamManager-macOS-arm64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/StreamManager-macOS-arm64.zip
          body: |
            ## Installation

            1. Download and unzip `StreamManager-macOS-arm64.zip`
            2. Move `StreamManager.app` to your Applications folder
            3. Right-click → Open (required once since the app is not code-signed)
            4. Copy `.env.example` to `.env` and fill in your credentials
